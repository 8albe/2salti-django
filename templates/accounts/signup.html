{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block content %}
<div class="min-h-[80vh] flex items-center justify-center">
    <div class="w-full max-w-md">

        <div class="glass p-8 rounded-2xl shadow-2xl relative overflow-hidden">
            <!-- Decorative Glow -->
            <div class="absolute top-0 right-0 w-32 h-32 bg-purple-500/20 rounded-full blur-3xl -mr-16 -mt-16"></div>

            <div class="text-center mb-8 relative z-10">
                <h2 class="text-3xl font-display font-bold text-white mb-2">Crea Account</h2>
                <p class="text-slate-400 text-sm">Unisciti alla community di Formichina</p>
            </div>

            <form method="post" class="space-y-4 relative z-10">
                {% csrf_token %}
                {{ form|crispy }}

                <button type="submit"
                    class="w-full py-3 px-4 rounded-xl bg-gradient-to-r from-purple-600 to-pink-600 text-white font-bold hover:shadow-[0_0_20px_rgba(216,180,254,0.4)] transition-all transform hover:-translate-y-0.5">
                    Registrati
                </button>
            </form>

            <div class="mt-6 text-center text-sm text-slate-500 relative z-10">
                Hai già un account? <a href="{% url 'login' %}"
                    class="text-purple-400 hover:text-purple-300 font-bold hover:underline">Accedi</a>
            </div>
        </div>

    </div>
</div>
{% endblock %}
