<div class="mb-8 overflow-hidden">
    <div class="flex items-center justify-between mb-4 px-2">
        <h3 class="text-xl font-bold font-display text-white">Calendario</h3>
        <div class="flex gap-2">
            <!-- Navigation arrows could go here if using JS implementation, 
                 but for scrollable list they are less critical on mobile -->
        </div>
    </div>

    <!-- Scrollable container -->
    <div class="flex overflow-x-auto pb-2 gap-1 no-scrollbar snap-x snap-mandatory px-2"
        style="scrollbar-width: none; -ms-overflow-style: none;">
        {% for date_obj in calendar_dates %}
        <a href="?date={{ date_obj|date:'Y-m-d' }}{% if selected_season %}&season={{ selected_season }}{% endif %}#matches-section" class="snap-center flex-shrink-0 flex flex-col items-center justify-center w-16 h-20 transition-all duration-300 relative group
                  {% if date_obj == selected_date %}
                    border-b-4 border-yellow-400 bg-white/5 text-white
                  {% else %}
                    border-b-4 border-transparent hover:bg-white/5 text-slate-400 hover:text-white
                  {% endif %}">

            <span class="text-sm font-medium uppercase tracking-wider mb-1">
                {{ date_obj|date:"D"|slice:":3" }}
            </span>
            <span class="text-2xl font-display font-bold">
                {{ date_obj|date:"d" }}
            </span>

            {% if date_obj == today and date_obj != selected_date %}
            <span class="absolute top-2 right-2 w-1.5 h-1.5 bg-cyan-500 rounded-full"></span>
            {% endif %}
        </a>
        {% endfor %}

        <!-- Next Arrow Placeholder (Visual only for now) -->
        <div class="flex items-center justify-center w-12 text-slate-600">
            <span class="text-xl">»</span>
        </div>
    </div>
</div>

<script>
    // Scroll active date into view on load
    document.addEventListener('DOMContentLoaded', function () {
        const activeDate = document.querySelector('.bg-cyan-600');
        if (activeDate) {
            activeDate.scrollIntoView({ behavior: 'auto', block: 'nearest', inline: 'center' });
        }
    });
</script>
