{% extends "base.html" %}

{% block content %}
<div class="max-w-2xl mx-auto py-12 px-4 sm:px-6 lg:px-8">
    <div class="mb-8 flex items-center gap-4">
        <a href="{% url 'club_admin_dashboard' %}" class="h-10 w-10 rounded-full bg-slate-800 flex items-center justify-center text-slate-400 hover:text-white hover:bg-slate-700 transition">
            <i class="fas fa-arrow-left"></i>
        </a>
        <div>
            <h2 class="text-3xl font-extrabold text-white shadow-text">Genera Nuovo Codice</h2>
            <p class="text-slate-400 mt-1">Crea un codice di accesso per atleti o dirigenti di {{ society.name }}</p>
        </div>
    </div>

    <div class="glass p-8 rounded-3xl border border-white/10">
        <form method="POST" class="space-y-6">
            {% csrf_token %}
            
            <div>
                <label class="block text-sm font-medium text-slate-300 mb-2">Destinazione (Squadra)</label>
                <select name="team_id" class="w-full bg-slate-900/50 border border-white/10 rounded-xl px-4 py-3 text-white focus:outline-none focus:ring-2 focus:ring-cyan-500 transition-all">
                    <option value="">Nessuna (Codice Globale Società)</option>
                    {% for team in teams %}
                    <option value="{{ team.id }}">{{ team.name }}</option>
                    {% endfor %}
                </select>
                <p class="text-xs text-slate-500 mt-1">Seleziona una squadra specifica se il codice vale solo per quella rosa.</p>
            </div>

            <div>
                <label class="block text-sm font-medium text-slate-300 mb-2">Ruolo da Assegnare</label>
                <select name="role" class="w-full bg-slate-900/50 border border-white/10 rounded-xl px-4 py-3 text-white focus:outline-none focus:ring-2 focus:ring-cyan-500 transition-all">
                    <option value="PLAYER">Atleta (Giocatore)</option>
                    <option value="HEAD_COACH">Allenatore Principale</option>
                    <option value="ASSISTANT_COACH">Vice Allenatore</option>
                    <option value="TEAM_MANAGER">Team Manager</option>
                </select>
            </div>

            <div>
                <label class="block text-sm font-medium text-slate-300 mb-2">Numero Massimo Utilizzi</label>
                <input type="number" name="max_uses" value="50" min="1" max="1000" class="w-full bg-slate-900/50 border border-white/10 rounded-xl px-4 py-3 text-white focus:outline-none focus:ring-2 focus:ring-cyan-500 transition-all">
                <p class="text-xs text-slate-500 mt-1">Usi totali prima della scadenza automatica.</p>
            </div>

            <div class="pt-4 border-t border-white/10">
                <button type="submit" class="w-full py-4 rounded-xl bg-cyan-600 hover:bg-cyan-500 text-white font-bold transition-all shadow-lg hover:shadow-cyan-500/30">
                    <i class="fas fa-magic mr-2"></i>Genera Codice
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
