{% extends 'base.html' %}

{% block content %}
<div class="max-w-md mx-auto px-4 py-8">
    <div class="glass-card p-8 text-center">
        <h1 class="text-2xl font-bold text-white mb-4">Check-in Allenamento</h1>
        <p class="text-gray-400 mb-8">{{ occurrence.training.title }}<br><span class="text-cyan-400 font-mono">{{ occurrence.start_time|date:"H:i" }}</span></p>

        <div id="geofence-status" class="mb-8 p-4 bg-white/5 rounded-lg text-sm">
            <p class="text-cyan-400" id="status-text">Acquisizione posizione in corso...</p>
        </div>

        <form id="rsvp-form" method="POST">
            {% csrf_token %}
            <input type="hidden" name="lat" id="lat-input">
            <input type="hidden" name="lng" id="lng-input">
            <input type="hidden" name="accuracy" id="acc-input">
            <input type="hidden" name="status" value="PRESENT">

            <div class="grid grid-cols-2 gap-4">
                <button type="button" onclick="submitRSVP('ABSENT')"
                    class="bg-red-500/20 hover:bg-red-500/30 text-red-400 px-6 py-4 rounded-xl font-bold transition-all border border-red-500/30">
                    Non Posso
                </button>
                <button type="button" id="present-btn" onclick="submitRSVP('PRESENT')" disabled
                    class="bg-cyan-500/20 text-cyan-500/50 px-6 py-4 rounded-xl font-bold transition-all border border-cyan-500/20 cursor-not-allowed">
                    Sono Qui
                </button>
            </div>
        </form>
    </div>
</div>

<script>
    const statusText = document.getElementById('status-text');
    const presentBtn = document.getElementById('present-btn');
    const latInput = document.getElementById('lat-input');
    const lngInput = document.getElementById('lng-input');
    const accInput = document.getElementById('acc-input');
    const rsvpForm = document.getElementById('rsvp-form');

    function submitRSVP(status) {
        document.querySelector('input[name="status"]').value = status;
        rsvpForm.submit();
    }

    if ("geolocation" in navigator) {
        navigator.geolocation.getCurrentPosition(function (position) {
            latInput.value = position.coords.latitude;
            lngInput.value = position.coords.longitude;
            accInput.value = position.coords.accuracy;

            statusText.innerHTML = "Posizione acquisita: ✓<br><span class='text-xs opacity-50'>(Accuratezza: " + Math.round(position.coords.accuracy) + "m)</span>";
            statusText.classList.remove('text-cyan-400');
            statusText.classList.add('text-green-400');

            presentBtn.disabled = false;
            presentBtn.classList.remove('bg-cyan-500/20', 'text-cyan-500/50', 'border-cyan-500/20', 'cursor-not-allowed');
            presentBtn.classList.add('bg-cyan-500', 'text-black', 'shadow-[0_0_20px_rgba(37,99,235,0.5)]');
        }, function (error) {
            statusText.innerHTML = "Errore GPS: " + error.message + "<br><span class='text-xs opacity-50'>Puoi comunque segnalare l'assenza.</span>";
            statusText.classList.add('text-yellow-400');
        });
    } else {
        statusText.innerHTML = "Navigatore non supporta Geolocation.";
    }
</script>

<style>
    .glass-card {
        background: rgba(255, 255, 255, 0.03);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.05);
        border-radius: 12px;
    }
</style>
{% endblock %}
